version: "3.9"

services:
  app:
    container_name: ${CONTAINER_NAME:-container}
    image: ${IMAGE_NAME:-image}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/Dockerfile
    mem_limit: ${MEM_LIMIT:-2g}
    mem_reservation: ${MEM_RESERVATION:-1g}
    cpus: ${CPUS:-1.0}

    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_TOOL_OPTIONS: >-
        -XX:InitialRAMPercentage=${INITIAL_RAM_PERCENTAGE:-20}
        -XX:MaxRAMPercentage=${MAX_RAM_PERCENTAGE:-80}
        -XX:MaxMetaspaceSize=${MAX_METASPACE_SIZE:-512m}
        -XX:+UseG1GC
        -XX:+ClassUnloadingWithConcurrentMark
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:+ExitOnOutOfMemoryError
        -Dspring.main.lazy-initialization=true
        -Dspring.threads.virtual.enabled=true
        -Dserver.tomcat.max-threads=${TOMCAT_THREADS:-128}
        -Dreactor.netty.ioWorkerCount=${NETTY_WORKERS:-4}
    ports:
      - "${APP_PORT}:8080"
    restart: "no"
    networks:
      - ms-net

networks:
  ms-net:
    external: true
